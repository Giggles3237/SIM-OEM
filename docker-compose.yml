version: '3.9'
services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: simoem
      POSTGRES_DB: simoem
      POSTGRES_USER: simoem
    ports:
      - '5432:5432'
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file: .env
    depends_on:
      - db
    ports:
      - '3333:3333'
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    depends_on:
      - api
    ports:
      - '5173:5173'
